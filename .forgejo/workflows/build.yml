name: build-springbootweb
on: [push]
jobs:
  build-springbootweb:
    runs-on: codeberg-small-lazy
    container:
       image: registry.opensuse.org/opensuse/bci/nodejs # 25.06.2026
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # 7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # 6.4.0 
        with:
          node-version: '26'
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # 5.2.0
        with:
          java-version: '25'
          distribution: 'temurin'
      - name: Build with Gradle
        run: |
           cd backend
           ./gradlew dependencyUpdates -DoutputFormatter=json,xml,html,txt,plain --refresh-dependencies
           ./gradlew clean build
