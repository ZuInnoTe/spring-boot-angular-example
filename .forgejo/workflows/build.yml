name: build-springbootweb
on: [push]
jobs:
  build-springbootweb:
    runs-on: codeberg-small-lazy
    container:
       image: registry.opensuse.org/opensuse/bci/nodejs # 05.04.2026
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # 6.2.0 
        with:
          node-version: '26'
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # 5.2.0
        with:
          java-version: '25'
          distribution: 'temurin'
      - name: Build with Gradle
        run: |
           cd backend
           ./gradlew dependencyUpdates -DoutputFormatter=json,xml,html,txt,plain --refresh-dependencies
           ./gradlew clean build
